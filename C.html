<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스타게임즈 런처</title>
    <style>
        /* 모든 CSS 부품들을 하나로 합쳤습니다 */
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; }
        .sidebar { width: 200px; background: #181818; height: 100vh; padding: 20px; border-right: 1px solid #333; }
        .main { flex: 1; padding: 40px; }
        .banner { 
            height: 300px; border-radius: 10px; padding: 30px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('fortnite.jpg');
            background-size: cover; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .play-btn { 
            background: #0077ff; color: white; border: none; padding: 15px 40px; 
            border-radius: 5px; font-weight: bold; cursor: pointer; width: fit-content;
        }
        .play-btn:hover { filter: brightness(1.2); }
        #search { width: 100%; padding: 10px; background: #333; border: none; color: white; border-radius: 4px; margin: 20px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #252525; padding: 10px; border-radius: 8px; text-align: center; }
        .card img { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1 style="color:#ffcc00">STAR GAMES</h1>
        <input type="text" id="search" placeholder="게임 검색..." onkeyup="filter()">
        <nav><p>🏠 라이브러리</p><p>🏆 경기 결과</p></nav>
    </div>
    <div class="main">
        <div class="banner">
            <h1>FORTNITE</h1>
            <button class="play-btn" onclick="location.href='https://www.fortnite.com/'">실행</button>
        </div>
        <div class="grid" id="grid">
            <div class="card" data-name="포트나이트"><img src="fortnite.jpg"><p>포트나이트</p></div>
        </div>
    </div>
    <script>
        function filter() {
            let val = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for(let c of cards) {
                c.style.display = c.getAttribute('data-name').includes(val) ? 'block' : 'none';
            }
        }
    </script>
</body>
</html>
